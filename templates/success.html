{% extends "base.html" %}
{% block title %}提交成功 · 毛孩子记忆馆{% endblock %}
{% block content %}
<section class="hero">
  <div style="font-size:48px;">🌷</div>
  <h1>提交成功</h1>
  <p class="sub">我们会先检查照片是否适合制作，并通过你的联系方式与你确认。</p>
</section>

<div class="notice">
  这不是复活，也不是替代。<br>
  这是一份基于照片和故事的纪念影像创作，希望它能帮你保存一段温柔的记忆。
</div>

<div style="text-align:center;margin-top:24px;">
  <a class="btn ghost" href="{{ url_for('index') }}">返回首页</a>
  <a class="btn accent" href="{{ url_for('garden', pet_name=pet_name) }}">进入记忆花园</a>
</div>
{% endblock %}
